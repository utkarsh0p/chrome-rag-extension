<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteWhisper — Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="option.css" />
</head>
<body>
  <div class="page">
    <div class="container">

      <!-- Header -->
      <div class="page-header">
        <svg class="header-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 11 L57 50 L16 89" stroke="#1a1a1a" stroke-width="11" stroke-linejoin="miter" stroke-linecap="round"/>
          <path d="M16 11 L57 50 L16 89" stroke="#fafaf8" stroke-width="5"  stroke-linejoin="miter" stroke-linecap="round"/>
          <path d="M57 14 A39 39 0 0 1 57 86" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
          <path d="M57 14 A39 39 0 0 1 57 86" stroke="#fafaf8" stroke-width="4.5" stroke-linecap="round"/>
          <line x1="57" y1="50" x2="90" y2="50" stroke="#1a1a1a" stroke-width="6.5" stroke-linecap="round"/>
          <line x1="57" y1="50" x2="90" y2="50" stroke="#fafaf8" stroke-width="3"   stroke-linecap="round"/>
          <line x1="57" y1="50" x2="80" y2="24" stroke="#1a1a1a" stroke-width="6.5" stroke-linecap="round"/>
          <line x1="57" y1="50" x2="80" y2="24" stroke="#fafaf8" stroke-width="3"   stroke-linecap="round"/>
          <line x1="57" y1="50" x2="80" y2="76" stroke="#1a1a1a" stroke-width="6.5" stroke-linecap="round"/>
          <line x1="57" y1="50" x2="80" y2="76" stroke="#fafaf8" stroke-width="3"   stroke-linecap="round"/>
          <line x1="57" y1="50" x2="57" y2="18" stroke="#1a1a1a" stroke-width="6.5" stroke-linecap="round"/>
          <line x1="57" y1="50" x2="57" y2="18" stroke="#fafaf8" stroke-width="3"   stroke-linecap="round"/>
          <line x1="57" y1="50" x2="57" y2="82" stroke="#1a1a1a" stroke-width="6.5" stroke-linecap="round"/>
          <line x1="57" y1="50" x2="57" y2="82" stroke="#fafaf8" stroke-width="3"   stroke-linecap="round"/>
          <circle cx="57" cy="50" r="9" fill="#fafaf8" opacity="0.9"/>
          <circle cx="57" cy="50" r="5" fill="white"/>
          <circle cx="57" cy="50" r="3" fill="#1a1a1a"/>
        </svg>
        <div class="header-text">
          <h2>SiteWhisper</h2>
          <p class="subtitle">Add keys for any providers you want to use</p>
        </div>
      </div>

      <!-- Provider rows -->
      <div class="providers">

        <!-- Claude -->
        <div class="provider-row">
          <div class="row-header">
            <div class="row-left">
              <span class="prov-icon claude-icon">◆</span>
              <div class="prov-meta">
                <span class="prov-name">Claude</span>
                <span class="prov-by">Anthropic</span>
              </div>
            </div>
            <div class="saved-badge" id="badge-claude">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              Saved
            </div>
          </div>
          <div class="row-input">
            <div class="input-wrap">
              <input type="password" id="key-claude" class="key-input" placeholder="sk-ant-api03-…" autocomplete="off" spellcheck="false" />
              <button class="eye-btn" type="button" data-for="key-claude">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="eye-closed" style="display:none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <p class="hint">Get at <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a> — starts with <code>sk-ant-</code></p>
          </div>
        </div>

        <!-- Gemini -->
        <div class="provider-row">
          <div class="row-header">
            <div class="row-left">
              <span class="prov-icon gemini-icon">✦</span>
              <div class="prov-meta">
                <span class="prov-name">Gemini</span>
                <span class="prov-by">Google</span>
              </div>
            </div>
            <div class="saved-badge" id="badge-gemini">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              Saved
            </div>
          </div>
          <div class="row-input">
            <div class="input-wrap">
              <input type="password" id="key-gemini" class="key-input" placeholder="AIzaSy…" autocomplete="off" spellcheck="false" />
              <button class="eye-btn" type="button" data-for="key-gemini">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="eye-closed" style="display:none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <p class="hint">Get at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a> — starts with <code>AIza</code></p>
          </div>
        </div>

        <!-- OpenAI -->
        <div class="provider-row">
          <div class="row-header">
            <div class="row-left">
              <span class="prov-icon openai-icon">⬡</span>
              <div class="prov-meta">
                <span class="prov-name">GPT</span>
                <span class="prov-by">OpenAI</span>
              </div>
            </div>
            <div class="saved-badge" id="badge-openai">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              Saved
            </div>
          </div>
          <div class="row-input">
            <div class="input-wrap">
              <input type="password" id="key-openai" class="key-input" placeholder="sk-proj-…" autocomplete="off" spellcheck="false" />
              <button class="eye-btn" type="button" data-for="key-openai">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="eye-closed" style="display:none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <p class="hint">Get at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a> — starts with <code>sk-</code></p>
          </div>
        </div>

      </div><!-- /providers -->

      <button class="save-btn" id="saveBtn">Save Keys</button>
      <div class="status-msg" id="statusMsg"></div>

    </div>
  </div>
  <script src="option.js"></script>
</body>
</html>
